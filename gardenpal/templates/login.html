{% extends "base.html" %}
{% block page_label %}{% endblock %}
{% block title %}Log in · GardenPal{% endblock %}

{% block content %}
  <div class="hero" style="padding-bottom:20px">
    <h1 class="hero-title">Your garden companion.</h1>
    <p class="hero-sub">Save plants you love, track what's in your yard, and keep a growing record of your garden over time.</p>
  </div>

  <div class="panel auth-panel">
    <form method="post" class="stack">
      <label>
        Username
        <input type="text" name="username" autocomplete="username" required />
      </label>
      <label>
        Password
        <input type="password" name="password" autocomplete="current-password" required />
      </label>
      <button type="submit" style="margin-top:4px">Log in</button>
    </form>
    <p class="muted" style="margin-top:16px;font-size:0.85rem">
      No account? <a href="{{ url_for('signup') }}" style="color:var(--green-mid)">Create one</a>
    </p>
  </div>
{% endblock %}
