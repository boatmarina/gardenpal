{% extends "base.html" %}
{% block title %}{{ title }} · GardenPal{% endblock %}
{% block page_label %}<span class="page-subtitle">{{ title }}</span>{% endblock %}
{% block content %}
<section class="panel" style="text-align:center;padding:32px 24px">
  <div style="font-size:2.5rem;margin-bottom:12px">{{ icon }}</div>
  <h2 style="margin-bottom:8px">{{ title }}</h2>
  <p style="color:var(--muted);font-size:0.9rem;max-width:340px;margin:0 auto 24px">{{ message }}</p>
  <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
    <button type="button" class="button button-secondary"
            onclick="history.length > 1 ? history.back() : (window.location='/')">
      ← Go back
    </button>
    <a href="{{ url_for('dashboard') }}" class="button">Home</a>
  </div>
  {% if show_report %}
  <details style="margin-top:24px;text-align:left;max-width:600px;margin-left:auto;margin-right:auto">
    <summary style="font-size:0.78rem;color:var(--muted);cursor:pointer;user-select:none">Show error details</summary>
    <pre id="error-report" style="margin-top:10px;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);font-size:0.72rem;line-height:1.5;white-space:pre-wrap;word-break:break-all;text-align:left;color:var(--muted);max-height:320px;overflow-y:auto">{{ report_body }}</pre>
    <button type="button" onclick="navigator.clipboard.writeText(document.getElementById('error-report').textContent).then(()=>{this.textContent='Copied!';setTimeout(()=>{this.textContent='Copy to clipboard'},1500)})" style="margin-top:8px;font-size:0.78rem;padding:5px 12px" class="button button-secondary">Copy to clipboard</button>
  </details>
  {% endif %}
</section>
{% endblock %}
