{% extends "base.html" %}
{% block page_label %}GardenPal{% endblock %}
{% block title %}Create account · GardenPal{% endblock %}

{% block content %}
  <div class="hero" style="padding-bottom:20px">
    <h1 class="hero-title">Start growing.</h1>
    <p class="hero-sub">Create your free GardenPal account.</p>
  </div>

  <div class="panel auth-panel">
    <form method="post" class="stack">
      <label>
        Username
        <input type="text" name="username" minlength="3" autocomplete="username" required />
      </label>
      <label>
        Password
        <input type="password" name="password" minlength="8" autocomplete="new-password" required />
      </label>
      <label>
        Confirm password
        <input type="password" name="confirm_password" minlength="8" autocomplete="new-password" required />
      </label>
      <button type="submit" style="margin-top:4px">Create account</button>
    </form>
    <p class="muted" style="margin-top:16px;font-size:0.85rem">
      Already have an account? <a href="{{ url_for('login') }}" style="color:var(--green-mid)">Log in</a>
    </p>
  </div>
{% endblock %}
