{% extends "base.html" %}
{% block content %}
  <section class="panel">
    <h2>Add Plant Idea</h2>
    <form method="post" enctype="multipart/form-data" class="stack">
      <label>
        Plant name *
        <input type="text" name="name" required />
      </label>
      <label>
        Scientific name
        <input type="text" name="scientific_name" placeholder="e.g., Echinacea purpurea" />
      </label>
      <label>
        Lookup query (common/scientific)
        <input type="text" name="lookup_query" placeholder="Text to use for automated lookup APIs" />
      </label>

      <label>
        Source type
        <select name="source_type">
          <option value="world">Seen out in the world</option>
          <option value="online">Seen online</option>
          <option value="nursery">Nursery</option>
        </select>
      </label>
      <label>
        Source note
        <input type="text" name="source_note" placeholder="Where/when you saw it" />
      </label>

      <label>
        Plant photo
        <input type="file" name="photo" accept="image/*" capture="environment" />
      </label>
      <label>
        Label photo (plant tag)
        <input type="file" name="label_photo" accept="image/*" capture="environment" />
      </label>
      <label>
        ...or image URL
        <input type="url" name="image_url" placeholder="https://..." />
      </label>

      <label>
        Lookup status
        <select name="lookup_status">
          <option value="not-started">Not started</option>
          <option value="draft">Draft info</option>
          <option value="verified">Verified</option>
        </select>
      </label>

      <div class="split">
        <label>
          Sun exposure
          <select name="sun_exposure">
            <option value="">Unknown</option>
            <option value="shade">Shade</option>
            <option value="part-sun">Part sun</option>
            <option value="full-sun">Full sun</option>
          </select>
        </label>
        <label>
          Lifecycle
          <select name="lifecycle">
            <option value="">Unknown</option>
            <option value="annual">Annual</option>
            <option value="perennial">Perennial</option>
            <option value="biennial">Biennial</option>
          </select>
        </label>
      </div>

      <label>
        Size info
        <input type="text" name="size_info" placeholder="Height/spread" />
      </label>
      <label>
        Flowering schedule
        <input type="text" name="flowering_schedule" placeholder="e.g., late spring to summer" />
      </label>

      <fieldset>
        <legend>Categories</legend>
        <div class="tags">
          {% for category in categories %}
            <label class="chip">
              <input type="checkbox" name="categories" value="{{ category.id }}" />
              {{ category.name }}
            </label>
          {% endfor %}
        </div>
        <label>
          Add new categories (comma separated)
          <input type="text" name="new_categories" placeholder="shade candidate, front border" />
        </label>
      </fieldset>

      <label>
        Notes
        <textarea name="notes" rows="4"></textarea>
      </label>

      <button type="submit">Save Idea</button>
    </form>
  </section>
{% endblock %}
