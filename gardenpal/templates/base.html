<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GardenPal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div class="container">
        <h1><a href="{{ url_for('index') }}">GardenPal</a></h1>
        <nav class="topnav">
          {% if current_user %}
            <span class="welcome">Hi, {{ current_user.username }}</span>
            <a class="button" href="{{ url_for('new_plant') }}">+ Add Plant</a>
            <form method="post" action="{{ url_for('logout') }}">
              <button type="submit" class="button button-secondary">Log out</button>
            </form>
          {% else %}
            <a class="button button-secondary" href="{{ url_for('login') }}">Log in</a>
            <a class="button" href="{{ url_for('signup') }}">Sign up</a>
          {% endif %}
        </nav>
      </div>
    </header>
    <main class="container">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash-area">
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
