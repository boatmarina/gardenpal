{% extends "base.html" %}
{% block page_label %}<span class="page-subtitle">Add Plant</span>{% endblock %}
{% block title %}Add Plant · GardenPal{% endblock %}

{% block content %}
  <a href="{{ url_for('garden_index') }}" class="back-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Garden
  </a>

  <div class="panel stack" style="overflow:visible">
    <form method="post" class="stack">
      <label>
        Plant name *
        <div style="position:relative">
          <input id="plant-name-input" type="text" name="plant_name"
                 value="{{ form_values.plant_name or '' }}" placeholder="e.g. Zucchini" required
                 autocomplete="off" autocorrect="off"
                 data-plant-names='{{ plant_names | tojson }}'
                 data-plant-varieties='{{ plant_varieties | tojson }}' />
          <ul id="plant-name-dropdown" class="tag-autocomplete-dropdown" hidden></ul>
        </div>
      </label>
      <label>
        Variety
        <div style="position:relative">
          <input id="variety-input" type="text" name="variety"
                 value="{{ form_values.variety or '' }}" placeholder="e.g. Black Beauty"
                 autocomplete="off" autocorrect="off" />
          <ul id="variety-dropdown" class="tag-autocomplete-dropdown" hidden></ul>
        </div>
      </label>
      {% if feature_garden_zones %}
      <label>
        Zone
        <div style="position:relative">
          <input id="zone-name-input" type="text" name="zone_name"
                 value="{{ form_values.zone_name or '' }}"
                 placeholder="e.g. Raised bed 1, Greenhouse…"
                 autocomplete="off" autocorrect="off"
                 data-zones='{{ zones_json | tojson }}' />
          <input type="hidden" name="zone_id" id="zone-id-hidden" value="{{ form_values.zone_id or '' }}" />
          <ul id="zone-name-dropdown" class="tag-autocomplete-dropdown" hidden></ul>
        </div>
      </label>
      {% endif %}
      <label>
        Location type
        <select name="location_type">
          <option value="">Choose…</option>
          <option value="raised_bed"  {% if form_values.location_type == "raised_bed"  %}selected{% endif %}>Raised bed</option>
          <option value="container"   {% if form_values.location_type == "container"   %}selected{% endif %}>Container</option>
          <option value="in_ground"   {% if form_values.location_type == "in_ground"   %}selected{% endif %}>In ground</option>
          <option value="greenhouse"  {% if form_values.location_type == "greenhouse"  %}selected{% endif %}>Greenhouse</option>
          <option value="other"       {% if form_values.location_type == "other"       %}selected{% endif %}>Other</option>
        </select>
      </label>
      <label>
        Location name
        <div style="position:relative">
          <input id="loc-name-input" type="text" name="location_name"
                 value="{{ form_values.location_name or '' }}"
                 placeholder="e.g. North bed, big pot on deck…"
                 autocomplete="off" autocorrect="off"
                 data-locations='{{ location_names | tojson }}' />
          <ul id="loc-name-dropdown" class="tag-autocomplete-dropdown" hidden></ul>
        </div>
      </label>
      <label>
        Date planted
        <input type="date" name="planted_date" value="{{ form_values.planted_date or '' }}" />
      </label>
      <label>
        Notes
        <textarea name="notes" rows="3" placeholder="Seed source, spacing, observations…">{{ form_values.notes or '' }}</textarea>
      </label>
      <button type="submit" style="margin-top:4px">Save to Garden</button>
    </form>
  </div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  var inp = document.getElementById('zone-name-input');
  var hiddenId = document.getElementById('zone-id-hidden');
  var dropdown = document.getElementById('zone-name-dropdown');
  if (!inp || !dropdown) return;
  var zones = [];
  try { zones = JSON.parse(inp.dataset.zones || '[]'); } catch(e) {}
  function show(q) {
    q = (q || '').trim().toLowerCase();
    var matches = q ? zones.filter(function(z) { return z.name.toLowerCase().includes(q); }) : zones;
    if (!matches.length) { dropdown.hidden = true; return; }
    dropdown.innerHTML = '';
    matches.forEach(function(zone) {
      var li = document.createElement('li');
      li.textContent = zone.name;
      function pick() { inp.value = zone.name; if (hiddenId) hiddenId.value = zone.id; dropdown.hidden = true; }
      li.addEventListener('mousedown', function(e) { e.preventDefault(); pick(); });
      li.addEventListener('touchstart', function(e) { e.preventDefault(); pick(); inp.blur(); });
      dropdown.appendChild(li);
    });
    dropdown.hidden = false;
  }
  inp.addEventListener('focus', function() { show(inp.value); });
  inp.addEventListener('input', function() { if (hiddenId) hiddenId.value = ''; show(inp.value); });
  inp.addEventListener('blur', function() { setTimeout(function() { dropdown.hidden = true; }, 200); });
  inp.addEventListener('keydown', function(e) { if (e.key === 'Escape') dropdown.hidden = true; });
})();
(function() {
  var inp = document.getElementById('loc-name-input');
  var dropdown = document.getElementById('loc-name-dropdown');
  if (!inp || !dropdown) return;
  var locations = [];
  try { locations = JSON.parse(inp.dataset.locations || '[]'); } catch(e) {}
  function show(query) {
    var q = (query || '').trim().toLowerCase();
    var matches = q ? locations.filter(function(l) { return l.toLowerCase().includes(q); }) : locations;
    if (!matches.length) { dropdown.hidden = true; return; }
    dropdown.innerHTML = '';
    matches.forEach(function(name) {
      var li = document.createElement('li');
      li.textContent = name;
      li.addEventListener('mousedown', function(e) { e.preventDefault(); inp.value = name; dropdown.hidden = true; });
      li.addEventListener('touchstart', function(e) { e.preventDefault(); inp.value = name; dropdown.hidden = true; inp.blur(); });
      dropdown.appendChild(li);
    });
    dropdown.hidden = false;
  }
  inp.addEventListener('focus', function() { show(inp.value); });
  inp.addEventListener('input', function() { show(inp.value); });
  inp.addEventListener('blur', function() { setTimeout(function() { dropdown.hidden = true; }, 200); });
  inp.addEventListener('keydown', function(e) { if (e.key === 'Escape') dropdown.hidden = true; });
})();
document.addEventListener('DOMContentLoaded', function() {
  var nameInp = document.getElementById('plant-name-input');
  if (!nameInp) return;
  var plantNames = [], plantVarieties = {};
  try { plantNames = JSON.parse(nameInp.dataset.plantNames || '[]'); } catch(e) {}
  try { plantVarieties = JSON.parse(nameInp.dataset.plantVarieties || '{}'); } catch(e) {}
  GP.setupPlantAutocomplete(
    nameInp,
    document.getElementById('plant-name-dropdown'),
    document.getElementById('variety-input'),
    document.getElementById('variety-dropdown'),
    plantNames, plantVarieties
  );
});
</script>
{% endblock %}
