{% extends "base.html" %}
{% block page_label %}Add Zone{% endblock %}
{% block content %}
  <a href="{{ url_for('yard_index') }}" class="back-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Yard
  </a>
  <section class="panel">
    <h2>Add Yard Zone</h2>
    <form method="post" enctype="multipart/form-data" class="stack">
      <label>
        Zone name *
        <input type="text" name="name" placeholder="Front porch bed, side yard, etc." required />
      </label>
      <label>
        Description
        <textarea name="description" rows="4" placeholder="Sun pattern, soil notes, dimensions..."></textarea>
      </label>
      <label>
        Reference photo of this zone
        <input type="file" name="reference_photo" accept="image/*" capture="environment" />
      </label>
      <button type="submit">Save Zone</button>
    </form>
  </section>
{% endblock %}
