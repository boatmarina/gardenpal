{% extends "base.html" %}
{% block page_label %}<span class="page-subtitle">Add Zone</span>{% endblock %}
{% block content %}
  <a href="{{ url_for('yard_index') }}" class="back-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Yard
  </a>
  <section class="panel">
    <h2>Add Yard Zone</h2>
    <form id="zone-new-form" method="post" enctype="multipart/form-data" class="stack">
      <label>
        Zone name *
        <input type="text" name="name" placeholder="Front porch bed, side yard, etc." required />
      </label>
      <label>
        Description
        <textarea name="description" rows="4" placeholder="Sun pattern, soil notes, dimensions..."></textarea>
      </label>
      <input type="file" name="reference_photo" accept="image/*" id="zone-ref-input"
             style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;overflow:hidden" />
      <div class="stack" style="gap:6px">
        <label style="margin-bottom:0">Reference photo of this zone</label>
        <div style="display:flex;gap:8px">
          <button type="button" class="button btn-upload" style="flex:1"
                  onclick="var i=document.getElementById('zone-ref-input');i.setAttribute('capture','environment');i.click()">
            Take Photo
          </button>
          <button type="button" class="button button-secondary btn-upload" style="flex:1"
                  onclick="var i=document.getElementById('zone-ref-input');i.removeAttribute('capture');i.click()">
            From Library
          </button>
        </div>
        <div id="zone-ref-preview" hidden>
          <img id="zone-ref-thumb" src="" alt="" style="width:100%;max-height:220px;object-fit:cover;border-radius:var(--r-md)" />
        </div>
      </div>
      <button type="submit" id="zone-save-btn">Save Zone</button>
    </form>
  </section>
{% endblock %}

{% block scripts %}
<script>
(function () {
  const input = document.getElementById('zone-ref-input');
  const preview = document.getElementById('zone-ref-preview');
  const thumb = document.getElementById('zone-ref-thumb');

  if (input) {
    input.addEventListener('change', async function() {
      const file = this.files[0];
      if (!file) return;
      if (thumb) { thumb.src = URL.createObjectURL(file); }
      if (preview) preview.hidden = false;
      const compressed = await GP.compressImage(file);
      try {
        const dt = new DataTransfer();
        dt.items.add(new File([compressed], 'photo.jpg', {type: 'image/jpeg'}));
        input.files = dt.files;
      } catch(e) {}
    });
  }
})();
</script>
{% endblock %}
